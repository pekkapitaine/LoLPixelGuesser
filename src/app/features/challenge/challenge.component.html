<div class="container">
  <a routerLink="/" class="back-btn">
    <img src="assets/interface/back_arrow.svg" alt="Retour">
  </a>

  <h2>⚡ Challenges</h2>
  <p class="subtitle">Choisis un défi</p>

  <div class="challenges-grid">
    <a routerLink="/challenge/item" class="challenge-card">
      <div class="challenge-icon">🗡️</div>
      <h3>Deviner l'item</h3>
      <p>Identifie l'item pixelisé parmi tous les items de LoL</p>
    </a>

    <a routerLink="/escalade" class="challenge-card escalade-card">
      <div class="challenge-icon">📈</div>
      <h3>Mode Escalade</h3>
      <p>Pixelisation croissante, une seule vie. Jusqu'où iras-tu ?</p>
      @if (escaladeService.bestScore() > 0) {
        <div class="best-score-badge">🏅 Record : {{ escaladeService.bestScore() }}</div>
      }
    </a>
  </div>
</div>
