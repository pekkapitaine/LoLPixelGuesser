<div class="container">
<app-back-btn />
  <h2>⚡ Challenges</h2>
  <p class="subtitle">Choisis un défi</p>

  <div class="challenges-grid">
    <a routerLink="/escalade" class="challenge-card escalade-card">
      @if (escaladeService.bestScore() > 0) {
        <div class="medal-badge">
          <img src="assets/interface/medaille.png" alt="Record" class="medal-img">
          <span class="medal-value">{{ escaladeService.bestScore() }}</span>
        </div>
      }
      <div class="challenge-icon">📈</div>
      <h3>Escalade</h3>
      <p>Survive le plus longtemps possible</p>
    </a>

    <a routerLink="/chrono" class="challenge-card chrono-card">
      @if (chronoService.bestTime() !== null) {
        <div class="medal-badge">
          <img src="assets/interface/medaille.png" alt="Record" class="medal-img">
          <span class="medal-value">{{ chronoService.formattedBest() }}</span>
        </div>
      }
      <div class="challenge-icon">⏱️</div>
      <h3>Chrono</h3>
      <p>10 champions, le plus vite possible</p>
    </a>
  </div>
</div>
