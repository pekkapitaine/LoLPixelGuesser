<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>LoL Pixel Guesser</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101820">
  <meta name="apple-mobile-web-app-title" content="LPG">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon/favicon96.png" type="image/png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <script>
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
      // Fix absolute asset paths for sub-path deployments (GitHub Pages)
      var base = document.querySelector('base') ? document.querySelector('base').getAttribute('href') : '/';
      var cursorBlue = 'url("' + base + 'assets/cursors/cursor_blue.png")';
      var cursorRed = 'url("' + base + 'assets/cursors/cursor_red.png")';
      document.documentElement.style.setProperty('--cursor-blue', cursorBlue);
      document.documentElement.style.setProperty('--cursor-red', cursorRed);
      var style = document.createElement('style');
      style.textContent = [
        '@font-face {',
        '  font-family: "DynaPuff";',
        '  src: url("' + base + 'assets/fonts/DynaPuff-VariableFont_wdth,wght.ttf") format("truetype");',
        '  font-weight: 100 900;',
        '  font-stretch: 75% 100%;',
        '  font-style: normal;',
        '}',
        'html, body { cursor: ' + cursorBlue + ', auto; }',
        'html:active, body:active { cursor: ' + cursorRed + ', auto; }'
      ].join('');
      document.head.appendChild(style);
    }(window.location))
  </script>
</head>
<body>
  <div id="splash">
    <img src="assets/interface/LPG_Title.png" alt="LoL Pixel Guesser" id="splash-logo">
    <button id="play-btn" onclick="
      var s = document.getElementById('splash');
      s.classList.add('fade-out');
      setTimeout(function(){ s.remove(); }, 500);
    ">▶ Jouer</button>
  </div>
  <app-root></app-root>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: #1e1e2f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #splash-logo {
      width: min(280px, 70vw);
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #play-btn {
      padding: 14px 40px;
      background: #f8d24b;
      color: #1e1e2f;
      border: none;
      border-radius: 999px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(0.97); }
    }
    @keyframes splash-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</body>
</html>
